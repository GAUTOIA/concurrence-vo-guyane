// Match competitor listings to stock vehicles by model keywords
// Exclude Guyane Automobile's own listings
function getComps(v) {
  const modelLow = v.model.toLowerCase().replace(/[-\s]/g,'');
  return COMPS_RAW.filter(c => {
    const tl = (c.t||'').toLowerCase();
    if(tl.includes('guyane automobile') || tl.includes('guyane occasion')) return false;
    if((c.url||'').includes('guyane-automobile')) return false;
    const tlc = tl.replace(/[-\s]/g,'');
    return tlc.includes(modelLow) || modelLow.includes(tl.split(' ')[1]||'zzz');
  }).map(c => ({src:'Cyphoma', t:c.t, p:c.p, url:c.url}));
}

// Attach comps to each vehicle
STOCK.forEach(v => { v.comps = getComps(v); });

const fp = p => p ? p.toLocaleString('fr-FR') + ' €' : '—';
const fk = k => (k && typeof k === 'number') ? k.toLocaleString('fr-FR') + ' km' : '—';
const firstUrl = s => { if(!s) return ''; const m = s.match(/https?:\/\/[^\s"]+?\.jpe?g/i); return m ? m[0] : ''; };
const mc = v => { const a=v.comps.map(c=>c.p).filter(p=>p>0); return a.length?Math.min(...a):null; };

function fuelTag(f) {
  if(!f) return '';
  const fl = f.toLowerCase();
  let cls = 'tag';
  if(fl==='électrique') cls+=' e';
  else if(fl.includes('hybride')) cls+=' h';
  else if(fl==='diesel') cls+=' d';
  return `<span class="${cls}">${f}</span>`;
}

function diffBadge(p, comps) {
  const a = comps.map(c=>c.p).filter(x=>x>0);
  if(!a.length) return '<span class="dn">—</span>';
  const m=Math.min(...a), d=p-m, pct=Math.abs(Math.round(d/m*100));
  if(d < -300) return `<span class="diff dc">−${pct}% vs marché</span>`;
  if(d > 300)  return `<span class="diff dp">+${pct}% vs marché</span>`;
  return '<span class="diff ds">≈ Prix similaire</span>';
}

function diffVal(p, comps) {
  const a=comps.map(c=>c.p).filter(x=>x>0);
  if(!a.length) return 999;
  return p - Math.min(...a);
}

let sortCol=4, sortDir=-1, curPage=1, filtered=[];

function sb(c) {
  if(sortCol===c) sortDir*=-1; else{sortCol=c;sortDir=1;}
  document.querySelectorAll('th').forEach((t,i)=>{t.classList.remove('asc','desc');if(i===c)t.classList.add(sortDir===1?'asc':'desc');});
  renderPage();
}

function getFiltered() {
  const s=document.getElementById('fs').value.toLowerCase();
  const mk=document.getElementById('fm').value;
  const fu=document.getElementById('ff').value.toLowerCase();
  const co=document.getElementById('fc').value;
  const pmin=parseFloat(document.getElementById('pmin').value)||0;
  const pmax=parseFloat(document.getElementById('pmax').value)||Infinity;

  return STOCK.filter(v => {
    if(s && !`${v.make} ${v.model} ${v.version}`.toLowerCase().includes(s)) return false;
    if(mk && v.make !== mk) return false;
    if(fu && (v.fuel||'').toLowerCase() !== fu) return false;
    if(v.price < pmin || v.price > pmax) return false;
    if(co==='with' && !v.comps.length) return false;
    if(co==='without' && v.comps.length) return false;
    if(co==='cheaper'){const m=mc(v);if(!m||v.price>=m)return false;}
    if(co==='pricier'){const m=mc(v);if(!m||v.price<=m)return false;}
    if(co.startsWith('src-')){const src=co.replace('src-','');if(!v.comps.some(c=>(c.src||'').toLowerCase().replace(/\s/g,'')===src))return false;}
    return true;
  }).sort((a,b)=>{
    let av,bv;
    if(sortCol===1){av=`${a.make}${a.model}`;bv=`${b.make}${b.model}`;}
    else if(sortCol===2){av=a.km||0;bv=b.km||0;}
    else if(sortCol===3){av=a.reg||'';bv=b.reg||'';}
    else if(sortCol===4){av=a.price||0;bv=b.price||0;}
    else if(sortCol===5){av=a.comps.length;bv=b.comps.length;}
    else if(sortCol===7){av=diffVal(a.price,a.comps);bv=diffVal(b.price,b.comps);}
    return typeof av==='number'?(av-bv)*sortDir:String(av).localeCompare(String(bv),'fr')*sortDir;
  });
}

function goPage(p) { curPage=p; renderPage(); }

function renderPage() {
  filtered = getFiltered();
  const pgSize = parseInt(document.getElementById('pg-size').value)||50;
  const total = filtered.length;
  const pages = Math.max(1, Math.ceil(total/pgSize));
  curPage = Math.max(1, Math.min(curPage, pages));
  const from = (curPage-1)*pgSize, to = Math.min(from+pgSize, total);
  const page = filtered.slice(from, to);

  const tb = document.getElementById('tb');
  tb.innerHTML = '';
  page.forEach(v => {
    const mp = mc(v), n = v.comps.length;
    const purl = firstUrl(v.photo);
    const ph = purl ? `<img class="th" src="${purl}" loading="lazy" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'">` : '';
    const btn = n
      ? `<button class="cbtn" id="b${v.id}" onclick="tc('${v.id}')"><span class="n">${n}</span>&nbsp;ann.&nbsp;▾</button>`
      : '<span class="noc">Aucun</span>';

    const tr = document.createElement('tr');
    tr.className = 'vrow';
    tr.innerHTML = `
      <td><div style="position:relative">${ph}<div class="noimg" style="display:${purl?'none':'flex'}">🚗</div></div></td>
      <td>
        <div class="mk">${v.make} ${v.model}</div>
        <div class="ver" title="${v.version}">${v.version||''}</div>
        <div class="tags">${fuelTag(v.fuel||'')}${v.body?`<span class="tag">${v.body}</span>`:''}</div>
      </td>
      <td class="kmv" style="white-space:nowrap">${fk(v.km)}</td>
      <td style="color:#64748b;white-space:nowrap">${v.reg||'—'}</td>
      <td><div class="ourp">${fp(v.price)}</div></td>
      <td>${btn}</td>
      <td style="font-weight:700;color:#fff;white-space:nowrap">${mp?mp.toLocaleString('fr-FR')+' €':'—'}</td>
      <td>${diffBadge(v.price,v.comps)}</td>`;
    tb.appendChild(tr);

    const cr = document.createElement('tr');
    cr.className = 'crow'; cr.id = 'crow-'+v.id;
    if(n) {
      const rows = v.comps.map(c=>`<tr>
        <td style="width:90px"><span class="src sc">Cyphoma</span></td>
        <td>${c.url?`<a href="${c.url}" target="_blank" rel="noopener">${c.t}</a>`:c.t}${c.p===mp?'<span class="best">★ min</span>':''}</td>
        <td class="kc">—</td>
        <td class="pc">${fp(c.p)}</td>
      </tr>`).join('');
      cr.innerHTML = `<td colspan="8"><div class="ci"><table class="ct">
        <thead><tr>
          <th style="font-size:9px;color:#334155;padding:5px 10px;background:none;border-bottom:1px solid rgba(51,65,85,.3);cursor:default">Source</th>
          <th style="font-size:9px;color:#334155;background:none;border-bottom:1px solid rgba(51,65,85,.3);cursor:default">Annonce</th>
          <th style="font-size:9px;color:#334155;background:none;border-bottom:1px solid rgba(51,65,85,.3);cursor:default">Km</th>
          <th style="font-size:9px;color:#334155;background:none;border-bottom:1px solid rgba(51,65,85,.3);cursor:default">Prix</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div></td>`;
    } else {
      cr.innerHTML = '<td colspan="8" style="padding:8px 10px 8px 52px;font-size:11px;color:#334155;font-style:italic">Aucune annonce concurrente trouvée pour ce modèle en Guyane (Cyphoma.com).</td>';
    }
    tb.appendChild(cr);
  });

  // Stats
  let ch=0,pr=0,no=0;
  filtered.forEach(v=>{const m=mc(v);if(!v.comps.length)no++;else if(m&&v.price){if(v.price<m)ch++;else if(v.price>m)pr++;}});
  document.getElementById('st').textContent = total.toLocaleString('fr-FR');
  document.getElementById('sc').textContent = filtered.filter(v=>v.comps.length).length;
  document.getElementById('sch').textContent = ch;
  document.getElementById('spr').textContent = pr;
  document.getElementById('sno').textContent = no;
  document.getElementById('b-count').textContent = total+' véhicules';

  // Pagination
  document.getElementById('pg-info').textContent = `Page ${curPage}/${pages} · ${from+1}–${to} sur ${total}`;
  document.getElementById('pg-prev').disabled = curPage<=1;
  document.getElementById('pg-next').disabled = curPage>=pages;
  window.scrollTo(0,0);
}

function tc(id) {
  const r=document.getElementById('crow-'+id),b=document.getElementById('b'+id);
  const o=r.classList.toggle('open');b.classList.toggle('open',o);
}

renderPage();
</script>
</body>
</html>
